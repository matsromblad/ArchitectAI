<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArchitectAI — Live Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0D1117;
    color: #E6EDF3;
    font-family: 'Courier New', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: #161B22;
    border-bottom: 1px solid #30363D;
  }
  header h1 {
    font-size: 18px;
    letter-spacing: 2px;
    color: #FFD700;
    text-shadow: 0 0 10px #FFD70055;
  }
  header .subtitle { font-size: 11px; color: #8B949E; }
  .tab-bar {
    display: flex;
    gap: 2px;
    padding: 0 20px;
    background: #161B22;
    border-bottom: 1px solid #30363D;
  }
  .tab {
    padding: 7px 18px;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    letter-spacing: 1px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: #8B949E;
    border-bottom: 2px solid transparent;
    transition: color 0.15s;
  }
  .tab:hover { color: #C9D1D9; }
  .tab.active { color: #FFD700; border-bottom: 2px solid #FFD700; }
  .tab-content { display: none; flex: 1; overflow: hidden; }
  .tab-content.active { display: flex; }

  /* Agents tab */
  .agents-grid {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
    align-content: start;
  }
  .agent-card {
    background: #161B22;
    border: 1px solid #30363D;
    border-radius: 6px;
    padding: 14px 16px;
    border-left: 3px solid var(--agent-color);
  }
  .agent-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .agent-card-avatar {
    width: 32px; height: 32px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
    color: #0D1117;
    flex-shrink: 0;
  }
  .agent-card-title { flex: 1; }
  .agent-card-title h4 { font-size: 13px; color: #E6EDF3; margin-bottom: 2px; }
  .agent-card-title .model-badge {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 10px;
    background: #21262D;
    color: #8B949E;
    border: 1px solid #30363D;
    display: inline-block;
  }
  .model-badge.opus { background: #2A1F4A; color: #B388FF; border-color: #7C3AED44; }
  .model-badge.sonnet { background: #1A2B4A; color: #79C0FF; border-color: #1F6FEB44; }
  .model-badge.haiku { background: #1A3C2A; color: #56D364; border-color: #2EA04344; }
  .agent-card p {
    font-size: 10px;
    color: #8B949E;
    line-height: 1.6;
    margin-bottom: 8px;
  }
  .agent-card-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .tag {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    background: #21262D;
    color: #8B949E;
    border: 1px solid #30363D;
  }
  .tag.input-tag  { border-color: #9B59B655; color: #9B59B6; }
  .tag.output-tag { border-color: #2ECC7155; color: #2ECC71; }
  .agent-card .how {
    font-size: 10px;
    color: #6E7681;
    border-top: 1px solid #21262D;
    margin-top: 8px;
    padding-top: 8px;
    line-height: 1.5;
  }

  /* Outputs tab */
  .outputs-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .outputs-header h2 { font-size: 13px; color: #E6EDF3; letter-spacing: 1px; }
  .outputs-header .legend { display: flex; gap: 12px; font-size: 10px; color: #8B949E; }
  .legend-dot { display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:4px; vertical-align:middle; }

  .milestone-folder {
    margin-bottom: 20px;
    border: 1px solid #30363D;
    border-radius: 6px;
    overflow: hidden;
  }
  .milestone-folder-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: #161B22;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid #30363D;
  }
  .milestone-folder-header:hover { background: #1C2128; }
  .milestone-folder-header .mf-icon { font-size: 14px; }
  .milestone-folder-header .mf-title { flex:1; font-size: 12px; font-weight: bold; color: #E6EDF3; }
  .milestone-folder-header .mf-status {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    background: #21262D; color: #8B949E;
  }
  .milestone-folder-header .mf-status.active { background: #1F4E79; color: #58A6FF; }
  .milestone-folder-header .mf-status.done { background: #1A3C2A; color: #2ECC71; }
  .milestone-folder-header .mf-status.pending { background: #21262D; color: #6E7681; }
  .milestone-folder-header .mf-chevron { font-size: 10px; color: #8B949E; transition: transform 0.2s; }
  .milestone-folder-header.collapsed .mf-chevron { transform: rotate(-90deg); }

  .milestone-folder-body {
    padding: 12px 14px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
    background: #0D1117;
  }
  .milestone-folder-body.hidden { display: none; }

  .discipline-group { margin-bottom: 4px; }
  .discipline-label {
    font-size: 9px;
    letter-spacing: 1px;
    color: #6E7681;
    text-transform: uppercase;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .discipline-label::after { content:''; flex:1; height:1px; background:#21262D; }

  .doc-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 4px;
    border: 1px solid #30363D;
    background: #161B22;
    font-size: 10px;
    cursor: default;
    transition: border-color 0.2s;
  }
  .doc-item:hover { border-color: #58A6FF44; }
  .doc-item.status-done { border-left: 3px solid #2ECC71; }
  .doc-item.status-active { border-left: 3px solid #58A6FF; animation: pulse 2s infinite; }
  .doc-item.status-rejected { border-left: 3px solid #E74C3C; }
  .doc-item.status-pending { border-left: 3px solid #30363D; opacity: 0.5; }
  .doc-icon { font-size: 13px; flex-shrink:0; }
  .doc-info { flex:1; min-width:0; }
  .doc-name { color: #C9D1D9; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .doc-meta { color: #6E7681; font-size: 9px; margin-top:1px; }
  .doc-badge {
    font-size: 8px; padding: 1px 5px; border-radius: 8px; flex-shrink:0;
    background: #21262D; color: #8B949E;
  }
  .doc-badge.done { background: #1A3C2A; color: #2ECC71; }
  .doc-badge.active { background: #1A2B4A; color: #58A6FF; }
  .doc-badge.rejected { background: #3C1215; color: #F85149; }
  .doc-badge.pending { background: #21262D; color: #6E7681; }
  .milestone-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #8B949E;
  }
  .milestone-bar .milestone {
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid #30363D;
    cursor: default;
  }
  .milestone.active {
    background: #1F4E79;
    border-color: #58A6FF;
    color: #58A6FF;
    animation: pulse 2s infinite;
  }
  .milestone.done { background: #1A3C2A; border-color: #2ECC71; color: #2ECC71; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  #worldCanvas {
    flex: 1;
    display: block;
    image-rendering: pixelated;
  }
  .sidebar {
    width: 280px;
    background: #161B22;
    border-left: 1px solid #30363D;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section {
    padding: 10px 14px;
    border-bottom: 1px solid #30363D;
  }
  .sidebar-section h3 {
    font-size: 10px;
    letter-spacing: 1px;
    color: #8B949E;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .agent-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    font-size: 11px;
  }
  .agent-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .agent-name { flex: 1; color: #C9D1D9; }
  .agent-status {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 2px;
    background: #21262D;
    color: #8B949E;
  }
  .agent-status.working { color: #3FB950; background: #1A3C2A; }
  .agent-status.waiting { color: #FFD700; background: #2E2700; }
  .agent-status.blocked { color: #F85149; background: #3C1215; }
  .agent-status.qa { color: #E67E22; background: #2D1A00; }
  .agent-status.approved { color: #58A6FF; background: #1A2B4A; }

  .qa-queue {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    border-bottom: 1px solid #30363D;
  }
  .qa-queue h3 {
    font-size: 10px;
    letter-spacing: 1px;
    color: #8B949E;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .qa-item {
    font-size: 10px;
    padding: 4px 8px;
    margin-bottom: 4px;
    border-radius: 3px;
    border-left: 3px solid #E74C3C;
    background: #1C1017;
    color: #C9D1D9;
  }
  .qa-item.pending { border-color: #E67E22; }

  .log-section {
    padding: 10px 14px;
    overflow-y: auto;
    max-height: 180px;
  }
  .log-section h3 {
    font-size: 10px;
    letter-spacing: 1px;
    color: #8B949E;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .log-entry {
    font-size: 10px;
    color: #8B949E;
    padding: 2px 0;
    border-bottom: 1px solid #21262D;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .log-entry span { color: #C9D1D9; }
</style>
</head>
<body>

<header>
  <div>
    <h1>⬛ ARCHITECTAI DASHBOARD</h1>
    <div class="subtitle">Multi-Agent Building Design System — Live Simulation</div>
  </div>
  <div class="milestone-bar" id="milestoneBar"></div>
</header>

<div class="tab-bar">
  <button class="tab active" onclick="switchTab('live')">🟢 LIVE VIEW</button>
  <button class="tab" onclick="switchTab('agents')">🤖 AGENTS</button>
  <button class="tab" onclick="switchTab('outputs')">📁 OUTPUTS</button>
</div>

<div id="tab-live" class="tab-content active">
<div class="main" style="flex:1;display:flex;overflow:hidden;">
  <canvas id="worldCanvas"></canvas>
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>Agent Status</h3>
      <div id="agentList"></div>
    </div>
    <div class="qa-queue">
      <h3>QA Queue</h3>
      <div id="qaQueue"></div>
    </div>
    <div class="log-section">
      <h3>Activity Log</h3>
      <div id="activityLog"></div>
    </div>
  </div>
</div>
</div><!-- end tab-live -->

<div id="tab-agents" class="tab-content" style="overflow-y:auto;">
  <div class="agents-grid" id="agentsGrid"></div>
</div>

<div id="tab-outputs" class="tab-content" style="overflow-y:auto; flex-direction:column;">
  <div id="outputsRoot" style="padding:16px 20px;"></div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const AGENTS = [
  { id:'pm',         name:'Proj. Manager', color:'#FFD700', hat:'#B8860B', abbr:'PM'  },
  { id:'parser',     name:'Input Parser',  color:'#9B59B6', hat:'#6C3483', abbr:'IP'  },
  { id:'brief',      name:'Brief Agent',   color:'#1ABC9C', hat:'#148F77', abbr:'BR'  },
  { id:'compliance', name:'Compliance',    color:'#E74C3C', hat:'#922B21', abbr:'CO'  },
  { id:'architect',  name:'Architect',     color:'#3498DB', hat:'#1A5276', abbr:'AR'  },
  { id:'structural', name:'Structural',    color:'#95A5A6', hat:'#616A6B', abbr:'ST'  },
  { id:'mep',        name:'MEP Agent',     color:'#E67E22', hat:'#935116', abbr:'ME'  },
  { id:'ifc',        name:'IFC Builder',   color:'#2ECC71', hat:'#1D8348', abbr:'IF'  },
  { id:'qa',         name:'QA Agent',      color:'#C0392B', hat:'#7B241C', abbr:'QA'  },
];

const MILESTONES = ['M1 Brief','M2 Layout','M3 Systems','M4 Model','M5 Export'];

const STATIONS = [
  { id:'meeting',    label:'🪑 MEETING ROOM', x:0.05, y:0.55, w:0.16, h:0.32, isMeeting: true },
  { id:'input',      label:'📥 INPUT',        x:0.05, y:0.12, w:0.12, h:0.14 },
  { id:'brief',      label:'📋 BRIEF',        x:0.22, y:0.05, w:0.12, h:0.14 },
  { id:'compliance', label:'📜 COMPLIANCE',   x:0.40, y:0.05, w:0.14, h:0.14 },
  { id:'design',     label:'📐 DESIGN',       x:0.22, y:0.32, w:0.14, h:0.14 },
  { id:'structure',  label:'🏗 STRUCTURE',    x:0.40, y:0.32, w:0.13, h:0.14 },
  { id:'mep',        label:'⚙️ MEP',          x:0.58, y:0.32, w:0.10, h:0.14 },
  { id:'qa',         label:'🔍 QA REVIEW',    x:0.60, y:0.05, w:0.14, h:0.25 },
  { id:'ifc',        label:'🏛 IFC BUILD',    x:0.76, y:0.32, w:0.12, h:0.14 },
  { id:'milestone',  label:'✅ MILESTONE',    x:0.76, y:0.05, w:0.11, h:0.14 },
];

// ============================================================
// STATE
// ============================================================
const canvas = document.getElementById('worldCanvas');
const ctx = canvas.getContext('2d');
let W, H;

let currentMilestone = 0;
let milestoneWaiting = false;
let tick = 0;
const logs = [];
const qaQueue = [];

const agentState = {};
AGENTS.forEach(a => {
  agentState[a.id] = {
    station: null,
    targetStation: null,
    x: 0, y: 0,
    tx: 0, ty: 0,
    moving: false,
    status: 'waiting',
    bobPhase: Math.random() * Math.PI * 2,
    stationTime: 0,
    rejected: false,
  };
});

// ============================================================
// WORKFLOW SIMULATION
// ============================================================
const workflow = [
  // Phase: Input
  () => moveAgent('parser', 'input', 'working'),
  () => { setTimeout(() => { moveAgent('brief', 'brief', 'working'); }, 1500); },
  () => { setTimeout(() => { moveAgent('pm', 'brief', 'working'); addLog('PM', 'Reviewing room program'); }, 3000); },
  () => { setTimeout(() => { moveAgent('compliance', 'compliance', 'working'); addLog('Compliance', 'Checking healthcare regulations (SE)'); }, 4500); },
  () => { setTimeout(() => { sendToQA('brief', 'Room Program v1'); }, 6000); },
  () => { setTimeout(() => { qaApprove('Room Program v1'); moveAgent('qa', 'milestone', 'waiting'); milestoneReached(); }, 8000); },
];

let workflowStep = 0;
let workflowTimer = 0;

function runWorkflow() {
  workflowTimer++;
  if (workflowTimer < 60) return;
  workflowTimer = 0;
  if (workflowStep < workflow.length) {
    workflow[workflowStep]();
    workflowStep++;
  }
}

// Big simulation loop
const simEvents = [];
let simTime = 0;
let simScheduled = false;

function scheduleAt(t, fn) { simEvents.push({t, fn}); simEvents.sort((a,b)=>a.t-b.t); }

function meetingBriefing(agentId, question, answer) {
  // Agent walks to meeting room, PM responds, agent walks back
  moveAgent(agentId, 'meeting', 'waiting');
  addLog(AGENTS.find(a=>a.id===agentId).name, `❓ ${question}`);
  scheduleAt(simTime + 60, () => {
    addLog('PM', `→ ${answer}`);
    moveAgent(agentId, agentState[agentId].station || 'brief', 'working');
  });
}

function initSim() {
  // Reset all doc statuses
  Object.values(OUTPUT_DOCS).forEach(phase => phase.forEach(d => { d.status='pending'; d.version=null; d.updatedAt=null; }));

  // PM is always in meeting room
  scheduleAt(10, () => { moveAgent('pm', 'meeting', 'working'); addLog('PM', 'Project kickoff — ready for briefings'); });

  // M1: Input + Brief
  scheduleAt(60,  () => { moveAgent('parser', 'input', 'working'); setDocStatus('site_data','active'); });
  scheduleAt(90,  () => addLog('Parser', 'Parsing floor plan PNG'));

  // Parser visits PM with a question
  scheduleAt(130, () => { moveAgent('parser', 'meeting', 'waiting'); addLog('Parser', '❓ Scale unclear in PNG — 1:100 or 1:200?'); });
  scheduleAt(190, () => { addLog('PM', '→ Confirmed 1:100. Proceed.'); moveAgent('parser', 'input', 'working'); });

  scheduleAt(200, () => { setDocStatus('site_data','done','v1'); });
  scheduleAt(230, () => { moveAgent('parser', 'brief', 'working'); moveAgent('brief', 'brief', 'working'); addLog('Brief', 'Generating room program'); setDocStatus('room_program','active'); });
  scheduleAt(280, () => { moveAgent('compliance', 'compliance', 'working'); addLog('Compliance', 'Loading SE healthcare rules (BBR, Socialstyrelsen)'); setDocStatus('compliance_m1','active'); });

  // Brief visits PM before QA
  scheduleAt(310, () => { moveAgent('brief', 'meeting', 'waiting'); addLog('Brief', '❓ Include isolation rooms in geriatric ward?'); });
  scheduleAt(370, () => { addLog('PM', '→ Yes, min 2 isolation rooms. Check with Compliance.'); moveAgent('brief', 'brief', 'working'); });

  scheduleAt(380, () => { setDocStatus('compliance_m1','done','v1'); });
  scheduleAt(420, () => { sendToQA('room-program', 'Room Program v1'); moveAgent('brief', 'qa', 'qa'); setDocStatus('qa_m1','active'); setDocStatus('room_program','done','v1'); });
  scheduleAt(500, () => { qaReject('room-program', 'Room Program v1'); setDocStatus('qa_m1','rejected'); moveAgent('brief', 'meeting', 'waiting'); addLog('Brief', '❓ QA rejected — missing isolation rooms'); });
  scheduleAt(560, () => { addLog('PM', '→ Escalating to user: isolation room count needed'); milestoneWaiting = true; moveAgent('pm', 'milestone', 'waiting'); });
  scheduleAt(660, () => { milestoneWaiting = false; addLog('PM', '✅ User confirmed: 3 isolation rooms. Resume.'); moveAgent('pm', 'meeting', 'working'); moveAgent('brief', 'brief', 'working'); });
  scheduleAt(720, () => { sendToQA('room-program', 'Room Program v2'); moveAgent('brief', 'qa', 'qa'); setDocStatus('room_program','active'); setDocStatus('qa_m1','active'); });
  scheduleAt(800, () => { qaApprove('room-program', 'Room Program v2'); setDocStatus('room_program','done','v2'); setDocStatus('qa_m1','done','v1'); addLog('QA', 'Room Program v2 — APPROVED'); });

  // M1 milestone gate
  scheduleAt(840,  () => { moveAgent('pm', 'milestone', 'waiting'); addLog('PM', '🚦 M1: Awaiting user approval'); milestoneWaiting = true; });
  scheduleAt(960,  () => { milestoneWaiting = false; currentMilestone = 1; addLog('PM', '✅ M1 approved — proceeding to layout'); moveAgent('pm', 'meeting', 'working'); updateMilestoneUI(); });

  // M2: Architecture + Compliance
  scheduleAt(1000, () => { moveAgent('architect', 'design', 'working'); addLog('Architect', 'Laying out geriatric ward floor plan'); setDocStatus('spatial_layout','active'); });
  scheduleAt(1050, () => { moveAgent('compliance', 'compliance', 'working'); addLog('Compliance', 'Checking corridor widths (BBR 3:4)'); setDocStatus('compliance_m2','active'); });

  // Architect visits PM
  scheduleAt(1090, () => { moveAgent('architect', 'meeting', 'waiting'); addLog('Architect', '❓ East wing: load-bearing wall conflicts with open plan'); });
  scheduleAt(1150, () => { addLog('PM', '→ Consult Structural. Keep corridor clear, adjust grid.'); moveAgent('architect', 'design', 'working'); });

  scheduleAt(1150, () => { setDocStatus('compliance_m2','done','v1'); });
  scheduleAt(1200, () => { sendToQA('layout', 'Floor Plan v1'); moveAgent('architect', 'qa', 'qa'); setDocStatus('spatial_layout','done','v1'); setDocStatus('qa_m2','active'); });
  scheduleAt(1280, () => { qaReject('layout', 'Floor Plan v1'); setDocStatus('qa_m2','rejected'); moveAgent('architect', 'design', 'working'); addLog('Architect', 'Widening corridors to 2400mm'); setDocStatus('spatial_layout','active'); });
  scheduleAt(1360, () => { sendToQA('layout', 'Floor Plan v2'); moveAgent('architect', 'qa', 'qa'); setDocStatus('spatial_layout','done','v2'); setDocStatus('qa_m2','active'); });
  scheduleAt(1440, () => { qaApprove('layout', 'Floor Plan v2'); setDocStatus('qa_m2','done','v1'); addLog('QA', 'Floor Plan v2 — APPROVED'); });
  scheduleAt(1480, () => { moveAgent('pm', 'milestone', 'waiting'); addLog('PM', '🚦 M2: Awaiting user approval'); milestoneWaiting = true; });
  scheduleAt(1600, () => { milestoneWaiting = false; currentMilestone = 2; addLog('PM', '✅ M2 approved — proceeding to systems'); moveAgent('pm', 'meeting', 'working'); updateMilestoneUI(); });

  // M3: Structure + MEP
  scheduleAt(1640, () => { moveAgent('structural', 'structure', 'working'); addLog('Structural', 'Calculating structural grid'); setDocStatus('structural','active'); });
  scheduleAt(1680, () => { moveAgent('mep', 'mep', 'working'); addLog('MEP', 'Routing HVAC and plumbing shafts'); setDocStatus('mep','active'); setDocStatus('compliance_m3','active'); });

  // MEP visits PM with conflict
  scheduleAt(1740, () => { moveAgent('mep', 'meeting', 'waiting'); addLog('MEP', '❓ Shaft position conflicts with stairwell'); });
  scheduleAt(1800, () => { addLog('PM', '→ Move shaft 1.2m west. Architect to confirm.'); moveAgent('mep', 'mep', 'working'); moveAgent('architect', 'meeting', 'waiting'); });
  scheduleAt(1840, () => { addLog('Architect', '❓ Confirming shaft shift impact on layout'); addLog('PM', '→ Approved. Update drawings.'); moveAgent('architect', 'design', 'working'); });

function resetSim() {
  simTime = 0;
  simEvents.length = 0;
  qaQueue.length = 0;
  currentMilestone = 0;
  milestoneWaiting = false;
  AGENTS.forEach(a => {
    const s = agentState[a.id];
    s.station = null;
    s.targetStation = null;
    s.moving = false;
    s.status = 'waiting';
    s.rejected = false;
  });
  updateMilestoneUI();
  initSim();
}

function moveAgent(agentId, stationId, status) {
  const s = agentState[agentId];
  const station = STATIONS.find(st => st.id === stationId);
  if (!station) return;
  s.targetStation = stationId;
  s.status = status;
  s.moving = true;
  s.rejected = (status === 'blocked');
}

function sendToQA(type, label) {
  qaQueue.push({ type, label, status: 'pending' });
  moveAgent('qa', 'qa', 'working');
  addLog('QA', `Reviewing: ${label}`);
  updateQAUI();
}

function qaApprove(type, label) {
  const idx = qaQueue.findIndex(q => q.type === type);
  if (idx >= 0) qaQueue.splice(idx, 1);
  addLog('QA', `✅ APPROVED: ${label}`);
  updateQAUI();
}

function qaReject(type, label) {
  const idx = qaQueue.findIndex(q => q.type === type);
  if (idx >= 0) qaQueue.splice(idx, 1);
  addLog('QA', `❌ REJECTED: ${label}`);
  updateQAUI();
}

function addLog(agent, msg) {
  const time = new Date().toLocaleTimeString('en', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  logs.unshift(`${time} [${agent}] ${msg}`);
  if (logs.length > 20) logs.pop();
  updateLogUI();
}

// ============================================================
// DRAWING
// ============================================================
function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  W = canvas.width = rect.width;
  H = canvas.height = rect.height;
}

function getStationRect(st) {
  return {
    x: st.x * W,
    y: st.y * H,
    w: st.w * W,
    h: st.h * H,
  };
}

function getStationCenter(stId) {
  const st = STATIONS.find(s => s.id === stId);
  if (!st) return { x: W/2, y: H/2 };
  const r = getStationRect(st);
  return { x: r.x + r.w/2, y: r.y + r.h/2 };
}

function getAgentSlotInStation(agentId, stId) {
  const agentsAtStation = AGENTS.filter(a => {
    const s = agentState[a.id];
    return (s.station === stId || s.targetStation === stId);
  });
  const idx = agentsAtStation.findIndex(a => a.id === agentId);
  const c = getStationCenter(stId);
  const slot = (idx - (agentsAtStation.length - 1) / 2) * 22;
  return { x: c.x + slot, y: c.y };
}

function drawStation(st) {
  const { x, y, w, h } = getStationRect(st);
  ctx.save();

  // Meeting Room special style
  if (st.isMeeting) {
    // Golden glow border
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 14;
    ctx.strokeStyle = '#FFD70088';
    ctx.lineWidth = 2;
    ctx.fillStyle = '#1A1700';
    roundRect(ctx, x, y, w, h, 6);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Label
    ctx.fillStyle = '#FFD700';
    ctx.font = `bold ${Math.max(9, W * 0.009)}px Courier New`;
    ctx.textAlign = 'center';
    ctx.fillText(st.label, x + w/2, y + 14);

    // Round table in center
    const cx = x + w/2, cy = y + h/2 + 8;
    const tr = Math.min(w, h) * 0.22;
    ctx.strokeStyle = '#B8860B';
    ctx.lineWidth = 2;
    ctx.fillStyle = '#2A1F00';
    ctx.beginPath();
    ctx.arc(cx, cy, tr, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Chairs around table
    const chairs = 6;
    for (let i = 0; i < chairs; i++) {
      const angle = (i / chairs) * Math.PI * 2;
      const cx2 = cx + Math.cos(angle) * (tr + 6);
      const cy2 = cy + Math.sin(angle) * (tr + 6);
      ctx.fillStyle = '#3D2B00';
      ctx.beginPath();
      ctx.arc(cx2, cy2, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // "PM always here" hint
    ctx.fillStyle = '#FFD70055';
    ctx.font = `${Math.max(7, W * 0.007)}px Courier New`;
    ctx.fillText('PM permanent', x + w/2, y + h - 8);

    ctx.restore();
    return;
  }

  // glow for milestone when waiting
  if (st.id === 'milestone' && milestoneWaiting) {
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 18;
  }
  if (st.id === 'qa') {
    ctx.shadowColor = '#C0392B';
    ctx.shadowBlur = 8;
  }

  ctx.strokeStyle = st.id === 'milestone' && milestoneWaiting ? '#FFD700' :
                    st.id === 'qa' ? '#C0392B44' : '#30363D';
  ctx.lineWidth = 1;
  ctx.fillStyle = '#161B22';
  roundRect(ctx, x, y, w, h, 4);
  ctx.fill();
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#8B949E';
  ctx.font = `bold ${Math.max(9, W * 0.009)}px Courier New`;
  ctx.textAlign = 'center';
  ctx.fillText(st.label, x + w/2, y + 14);

  // QA queue count
  if (st.id === 'qa' && qaQueue.length > 0) {
    ctx.fillStyle = '#E74C3C';
    ctx.font = `bold ${Math.max(10, W * 0.01)}px Courier New`;
    ctx.fillText(`[${qaQueue.length} pending]`, x + w/2, y + 28);
  }

  // Milestone waiting text
  if (st.id === 'milestone' && milestoneWaiting) {
    ctx.fillStyle = '#FFD700';
    ctx.font = `${Math.max(8, W * 0.008)}px Courier New`;
    ctx.fillText('⏳ AWAITING', x + w/2, y + h - 8);
  }

  ctx.restore();
}

// Pixel humanoid (16×24 grid, scale factor)
function drawPixelAgent(x, y, color, hat, scale, status, bobPhase, rejected) {
  const s = scale;
  const bop = rejected ? Math.sin(bobPhase * 3) * 2 : Math.sin(bobPhase) * (status === 'working' ? 2 : 0.5);
  const ry = Math.round(y + bop);

  // shadow
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(x, ry + s*12, s*6, s*2, 0, 0, Math.PI*2);
  ctx.fill();

  // legs
  ctx.fillStyle = '#2C3E50';
  if (status === 'working') {
    // walking animation
    const walk = Math.sin(bobPhase * 4) * s * 2;
    ctx.fillRect(x - s*3, ry + s*7, s*2, s*5 + walk);
    ctx.fillRect(x + s*1, ry + s*7, s*2, s*5 - walk);
  } else {
    ctx.fillRect(x - s*3, ry + s*7, s*2, s*5);
    ctx.fillRect(x + s*1, ry + s*7, s*2, s*5);
  }

  // body
  ctx.fillStyle = color + 'CC';
  ctx.fillRect(x - s*4, ry + s*1, s*8, s*7);

  // arms
  ctx.fillStyle = color + '99';
  if (status === 'working') {
    const arm = Math.sin(bobPhase * 4 + 1) * s * 2;
    ctx.fillRect(x - s*6, ry + s*2 + arm, s*2, s*4);
    ctx.fillRect(x + s*4, ry + s*2 - arm, s*2, s*4);
  } else {
    ctx.fillRect(x - s*6, ry + s*2, s*2, s*4);
    ctx.fillRect(x + s*4, ry + s*2, s*2, s*4);
  }

  // head
  ctx.fillStyle = '#F5CBA7';
  ctx.fillRect(x - s*3, ry - s*4, s*6, s*5);

  // eyes
  ctx.fillStyle = '#1A1A1A';
  ctx.fillRect(x - s*2, ry - s*3, s*1, s*1);
  ctx.fillRect(x + s*1, ry - s*3, s*1, s*1);

  // hat / helmet
  ctx.fillStyle = hat;
  ctx.fillRect(x - s*4, ry - s*5, s*8, s*2);
  ctx.fillRect(x - s*3, ry - s*7, s*6, s*3);

  // status icon above head
  ctx.font = `${Math.max(9, s * 8)}px serif`;
  ctx.textAlign = 'center';
  if (status === 'blocked' || rejected) {
    ctx.fillText('💢', x, ry - s*9);
  } else if (status === 'waiting') {
    // Animated Zzz sleep bubbles
    const zCount = 3;
    for (let i = 0; i < zCount; i++) {
      // Each Z floats up and fades at a different offset
      const offset = (bobPhase * 0.4 + i * (Math.PI * 2 / zCount)) % (Math.PI * 2);
      const progress = offset / (Math.PI * 2); // 0..1
      const zx = x + s * 3 + progress * s * 5;
      const zy = ry - s * 9 - progress * s * 8;
      const alpha = Math.sin(progress * Math.PI); // fade in then out
      const zSize = Math.max(7, s * 5 + progress * s * 3);
      ctx.save();
      ctx.globalAlpha = alpha * 0.85;
      ctx.font = `bold ${zSize}px Courier New`;
      ctx.fillStyle = '#79C0FF';
      ctx.fillText('z', zx, zy);
      ctx.restore();
    }
  } else if (status === 'qa') {
    ctx.fillText('📋', x, ry - s*9);
  } else if (status === 'approved') {
    ctx.fillText('✅', x, ry - s*9);
  }

  ctx.restore();
}

function drawAgentLabel(x, y, name, scale) {
  ctx.save();
  ctx.font = `${Math.max(8, scale * 7)}px Courier New`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#0D1117CC';
  const tw = ctx.measureText(name).width;
  ctx.fillRect(x - tw/2 - 2, y + scale*14, tw + 4, scale*7 + 2);
  ctx.fillStyle = '#E6EDF3';
  ctx.fillText(name, x, y + scale*20);
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - h + r, y + h);  // bug fix workaround
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawConnectors() {
  const pairs = [
    ['meeting','input'], ['meeting','brief'], ['meeting','compliance'],
    ['meeting','design'], ['meeting','structure'], ['meeting','mep'],
    ['meeting','ifc'], ['meeting','milestone'],
    ['input','brief'], ['brief','compliance'], ['compliance','qa'],
    ['brief','design'], ['design','structure'], ['structure','mep'],
    ['mep','qa'], ['design','qa'], ['qa','milestone'],
    ['structure','qa'], ['ifc','qa'], ['mep','ifc'],
  ];
  ctx.save();
  ctx.strokeStyle = '#30363D55';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]);
  for (const [a, b] of pairs) {
    const ca = getStationCenter(a);
    const cb = getStationCenter(b);
    ctx.beginPath();
    ctx.moveTo(ca.x, ca.y);
    ctx.lineTo(cb.x, cb.y);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();
}

// ============================================================
// MAIN LOOP
// ============================================================
const SCALE = 2;
const SPEED = 0.04;

function update() {
  tick++;
  simTime++;

  // Process scheduled events
  while (simEvents.length > 0 && simEvents[0].t <= simTime) {
    simEvents.shift().fn();
  }

  // Update agent positions
  AGENTS.forEach(a => {
    const s = agentState[a.id];
    s.bobPhase += 0.06;

    if (s.targetStation) {
      const slot = getAgentSlotInStation(a.id, s.targetStation);
      s.tx = slot.x;
      s.ty = slot.y;

      if (s.station === null) {
        // Snap to start position (waiting area at bottom)
        const idx = AGENTS.indexOf(a);
        s.x = W * 0.25 + (idx % 5) * 30;
        s.y = H * 0.88 - Math.floor(idx / 5) * 36;
        s.station = s.targetStation;
      }

      const dx = s.tx - s.x;
      const dy = s.ty - s.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 2) {
        s.x += dx * SPEED * (1 + dist * 0.005);
        s.y += dy * SPEED * (1 + dist * 0.005);
        s.moving = true;
      } else {
        s.x = s.tx;
        s.y = s.ty;
        s.moving = false;
        s.station = s.targetStation;
      }
    }
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Grid background
  ctx.save();
  ctx.strokeStyle = '#161B2288';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.restore();

  drawConnectors();

  // Stations
  STATIONS.forEach(st => drawStation(st));

  // Agents — always draw, snap to waiting area if not yet placed
  AGENTS.forEach((a, idx) => {
    const s = agentState[a.id];
    if (!s.x || !s.y) {
      s.x = W * 0.25 + (idx % 5) * 30;
      s.y = H * 0.88 - Math.floor(idx / 5) * 36;
    }
    drawPixelAgent(s.x, s.y, a.color, a.hat, SCALE, s.status, s.bobPhase, s.rejected);
    drawAgentLabel(s.x, s.y, a.abbr, SCALE);
  });

  // Title watermark
  ctx.save();
  ctx.font = `bold ${Math.max(10, W * 0.012)}px Courier New`;
  ctx.fillStyle = '#FFD70015';
  ctx.textAlign = 'right';
  ctx.fillText('ArchitectAI v0.1', W - 10, H - 10);
  ctx.restore();
}

function loop() {
  update();
  draw();
  updateAgentUI();
  requestAnimationFrame(loop);
}

function updateMilestoneUI() {
  const bar = document.getElementById('milestoneBar');
  bar.innerHTML = MILESTONES.map((m, i) => {
    const cls = i < currentMilestone ? 'done' : i === currentMilestone ? 'active' : '';
    return `<span class="milestone ${cls}">${m}</span>`;
  }).join('→');
}

function updateAgentUI() {
  if (tick % 10 !== 0) return;
  const list = document.getElementById('agentList');
  list.innerHTML = AGENTS.map(a => {
    const s = agentState[a.id];
    const statusLabel = s.moving ? 'moving' : s.status;
    return `
      <div class="agent-row">
        <div class="agent-dot" style="background:${a.color}"></div>
        <div class="agent-name">${a.name}</div>
        <div class="agent-status ${statusLabel}">${statusLabel}</div>
      </div>`;
  }).join('');
}

function updateQAUI() {
  const el = document.getElementById('qaQueue');
  if (qaQueue.length === 0) {
    el.innerHTML = '<div style="font-size:10px;color:#8B949E">No items in queue</div>';
    return;
  }
  el.innerHTML = qaQueue.map(q =>
    `<div class="qa-item pending">${q.label}</div>`
  ).join('');
}

function updateLogUI() {
  const el = document.getElementById('activityLog');
  el.innerHTML = logs.slice(0, 8).map(l =>
    `<div class="log-entry">${l}</div>`
  ).join('');
}

function setDocStatus(id, status, version) {
  for (const phase of Object.values(OUTPUT_DOCS)) {
    const doc = phase.find(d => d.id === id);
    if (doc) {
      doc.status = status;
      if (version) doc.version = version;
      doc.updatedAt = new Date().toLocaleTimeString('en', {hour:'2-digit', minute:'2-digit'});
    }
  }
}

function getMilestoneStatus(key) {
  const idx = ['m1','m2','m3','m4','m5'].indexOf(key);
  if (idx < currentMilestone) return 'done';
  if (idx === currentMilestone) return 'active';
  return 'pending';
}

function renderOutputs() {
  const root = document.getElementById('outputsRoot');

  // Group docs by discipline within each milestone
  const html = MILESTONE_META.map(m => {
    const docs = OUTPUT_DOCS[m.key] || [];
    const status = getMilestoneStatus(m.key);
    const doneCount = docs.filter(d => d.status === 'done').length;
    const statusLabel = status === 'done' ? 'Complete' : status === 'active' ? 'In Progress' : 'Pending';

    // Group by discipline
    const byDiscipline = {};
    docs.forEach(d => {
      if (!byDiscipline[d.discipline]) byDiscipline[d.discipline] = [];
      byDiscipline[d.discipline].push(d);
    });

    const disciplineHTML = Object.entries(byDiscipline).map(([disc, items]) => {
      const itemsHTML = items.map(doc => {
        const badgeLabel = doc.status === 'done' ? (doc.version || 'Done') :
                           doc.status === 'active' ? 'Working…' :
                           doc.status === 'rejected' ? 'Rejected' : '—';
        return `
          <div class="doc-item status-${doc.status}">
            <span class="doc-icon">${doc.icon}</span>
            <div class="doc-info">
              <div class="doc-name">${doc.name}</div>
              <div class="doc-meta">${doc.meta}${doc.updatedAt ? ' · ' + doc.updatedAt : ''}</div>
            </div>
            <span class="doc-badge ${doc.status}">${badgeLabel}</span>
          </div>`;
      }).join('');
      return `
        <div class="discipline-group">
          <div class="discipline-label">${disc}</div>
          ${itemsHTML}
        </div>`;
    }).join('');

    return `
      <div class="milestone-folder">
        <div class="milestone-folder-header" onclick="toggleFolder('${m.key}')">
          <span class="mf-icon">${m.icon}</span>
          <span class="mf-title">${m.label}</span>
          <span style="font-size:10px;color:#6E7681;margin-right:8px">${doneCount}/${docs.length} files</span>
          <span class="mf-status ${status}">${statusLabel}</span>
          <span class="mf-chevron">▼</span>
        </div>
        <div class="milestone-folder-body" id="folder-${m.key}">
          <div style="grid-column:1/-1;font-size:10px;color:#6E7681;margin-bottom:6px">${m.desc}</div>
          ${disciplineHTML}
        </div>
      </div>`;
  }).join('');

  root.innerHTML = `
    <div class="outputs-header">
      <h2>📁 PROJECT OUTPUT FILES</h2>
      <div class="legend">
        <span><span class="legend-dot" style="background:#2ECC71"></span>Done</span>
        <span><span class="legend-dot" style="background:#58A6FF"></span>Active</span>
        <span><span class="legend-dot" style="background:#E74C3C"></span>Rejected</span>
        <span><span class="legend-dot" style="background:#30363D"></span>Pending</span>
      </div>
    </div>
    ${html}`;
}

function toggleFolder(key) {
  const body = document.getElementById(`folder-${key}`);
  const header = body.previousElementSibling;
  body.classList.toggle('hidden');
  header.classList.toggle('collapsed');
}
