<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Nightingale — Live Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #F8F9FA url('medarch_bg.png') no-repeat center center fixed;
    background-size: cover;
    color: #212529;
    font-family: 'Courier New', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: #FFFFFF;
    border-bottom: 1px solid rgba(0,0,0,0.12);
  }
  header h1 {
    font-size: 18px;
    letter-spacing: 2px;
    color: #BEB1A4;
    text-shadow: 0 0 10px #BEB1A455;
  }
  header .subtitle { font-size: 11px; color: #495057; }
  .tab-bar {
    display: flex;
    gap: 2px;
    padding: 0 20px;
    background: #FFFFFF;
    border-bottom: 1px solid rgba(0,0,0,0.12);
  }
  .tab {
    padding: 7px 18px;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    letter-spacing: 1px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: #495057;
    border-bottom: 2px solid transparent;
    transition: color 0.15s;
  }
  .tab:hover { color: #C9D1D9; }
  .tab.active { color: #BEB1A4; border-bottom: 2px solid #BEB1A4; }
  .tab-content { display: none; flex: 1; overflow: hidden; }
  .tab-content.active { display: flex; }

  /* Agents tab */
  .agents-grid {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
    align-content: start;
  }
  .agent-card {
    background: #FFFFFF;
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 6px;
    padding: 14px 16px;
    border-left: 3px solid var(--agent-color);
  }
  .agent-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .agent-card-avatar {
    width: 100px; height: 120px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
    color: #F8F9FA;
    flex-shrink: 0;
  }
  .agent-card-title { flex: 1; }
  .agent-card-title h4 { font-size: 13px; color: #212529; margin-bottom: 2px; }
  .agent-card-title .model-badge {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 10px;
    background: rgba(0,0,0,0.04);
    color: #495057;
    border: 1px solid rgba(0,0,0,0.12);
    display: inline-block;
  }
  .model-badge.opus { background: #2A1F4A; color: #B388FF; border-color: #7C3AED44; }
  .model-badge.sonnet { background: #1A2B4A; color: #79C0FF; border-color: #1F6FEB44; }
  .model-badge.haiku { background: #1A3C2A; color: #56D364; border-color: #2EA04344; }
  .agent-card p {
    font-size: 10px;
    color: #495057;
    line-height: 1.6;
    margin-bottom: 8px;
  }
  .agent-card-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .tag {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(0,0,0,0.04);
    color: #495057;
    border: 1px solid rgba(0,0,0,0.12);
  }
  .tag.input-tag  { border-color: #9B59B655; color: #9B59B6; }
  .tag.output-tag { border-color: #2ECC7155; color: #2ECC71; }
  .agent-card .how {
    font-size: 10px;
    color: #868E96;
    border-top: 1px solid rgba(0,0,0,0.04);
    margin-top: 8px;
    padding-top: 8px;
    line-height: 1.5;
  }

  /* Outputs tab */
  .outputs-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .outputs-header h2 { font-size: 13px; color: #212529; letter-spacing: 1px; }
  .outputs-header .legend { display: flex; gap: 12px; font-size: 10px; color: #495057; }
  .legend-dot { display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:4px; vertical-align:middle; }

  .milestone-folder {
    margin-bottom: 20px;
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 6px;
    overflow: hidden;
  }
  .milestone-folder-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: #FFFFFF;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid rgba(0,0,0,0.12);
  }
  .milestone-folder-header:hover { background: #F1F3F5; }
  .milestone-folder-header .mf-icon { font-size: 14px; }
  .milestone-folder-header .mf-title { flex:1; font-size: 12px; font-weight: bold; color: #212529; }
  .milestone-folder-header .mf-status {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    background: rgba(0,0,0,0.04); color: #495057;
  }
  .milestone-folder-header .mf-status.active { background: #1F4E79; color: #58A6FF; }
  .milestone-folder-header .mf-status.done { background: #1A3C2A; color: #2ECC71; }
  .milestone-folder-header .mf-status.pending { background: rgba(0,0,0,0.04); color: #868E96; }
  .milestone-folder-header .mf-chevron { font-size: 10px; color: #495057; transition: transform 0.2s; }
  .milestone-folder-header.collapsed .mf-chevron { transform: rotate(-90deg); }

  .milestone-folder-body {
    padding: 12px 14px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
    background: #F8F9FA;
  }
  .milestone-folder-body.hidden { display: none; }

  .discipline-group { margin-bottom: 4px; }
  .discipline-label {
    font-size: 9px;
    letter-spacing: 1px;
    color: #868E96;
    text-transform: uppercase;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .discipline-label::after { content:''; flex:1; height:1px; background:rgba(0,0,0,0.04); }

  .doc-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 4px;
    border: 1px solid rgba(0,0,0,0.12);
    background: #FFFFFF;
    font-size: 10px;
    cursor: default;
    transition: border-color 0.2s;
  }
  .doc-item:hover { border-color: #58A6FF44; }
  .doc-item.status-done { border-left: 3px solid #2ECC71; }
  .doc-item.status-active { border-left: 3px solid #58A6FF; animation: pulse 2s infinite; }
  .doc-item.status-rejected { border-left: 3px solid #E74C3C; }
  .doc-item.status-pending { border-left: 3px solid rgba(0,0,0,0.12); opacity: 0.5; }
  .doc-icon { font-size: 13px; flex-shrink:0; }
  .doc-info { flex:1; min-width:0; }
  .doc-name { color: #C9D1D9; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .doc-meta { color: #868E96; font-size: 9px; margin-top:1px; }
  .doc-badge {
    font-size: 8px; padding: 1px 5px; border-radius: 8px; flex-shrink:0;
    background: rgba(0,0,0,0.04); color: #495057;
  }
  .doc-badge.done { background: #1A3C2A; color: #2ECC71; }
  .doc-badge.active { background: #1A2B4A; color: #58A6FF; }
  .doc-badge.rejected { background: #3C1215; color: #F85149; }
  .doc-badge.pending { background: rgba(0,0,0,0.04); color: #868E96; }
  .milestone-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #495057;
  }
  .milestone-bar .milestone {
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.12);
    cursor: default;
  }
  .milestone.active {
    background: #1F4E79;
    border-color: #58A6FF;
    color: #58A6FF;
    animation: pulse 2s infinite;
  }
  .milestone.done { background: #1A3C2A; border-color: #2ECC71; color: #2ECC71; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }

  @keyframes flyIn {
    from { transform: translateX(40px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }
  .doc-item { animation: flyIn 0.3s ease-out both; }

  /* WebSocket connection status indicator */
  .ws-status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-family: 'Courier New', monospace;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.12);
    user-select: none;
    cursor: default;
  }
  .ws-status.ws-connected  { color: #2ECC71; border-color: #2ECC7144; background: #0A1F0E; }
  .ws-status.ws-disconnected { color: #495057; border-color: rgba(0,0,0,0.12);   background: rgba(0,0,0,0.04); }
  .ws-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .ws-dot.ws-live { background: #2ECC71; animation: wsPulse 1.2s ease-in-out infinite; }
  .ws-dot.ws-sim  { background: #495057; }
  @keyframes wsPulse {
    0%,100% { opacity:1; box-shadow: 0 0 5px #2ECC71; }
    50%      { opacity:0.4; box-shadow: none; }
  }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  #worldCanvas {
    flex: 1;
    display: block;
    image-rendering: pixelated;
  }
  .sidebar {
    width: 280px;
    background: #FFFFFF;
    border-left: 1px solid rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(0,0,0,0.12);
  }
  .sidebar-section h3 {
    font-size: 10px;
    letter-spacing: 1px;
    color: #495057;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .agent-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    font-size: 11px;
  }
  .agent-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .agent-name { flex: 1; color: #C9D1D9; }
  .agent-status {
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 2px;
    background: rgba(0,0,0,0.04);
    color: #495057;
  }
  .agent-status.working { color: #3FB950; background: #1A3C2A; }
  .agent-status.waiting { color: #BEB1A4; background: #2E2700; }
  .agent-status.blocked { color: #F85149; background: #3C1215; }
  .agent-status.qa { color: #E67E22; background: #2D1A00; }
  .agent-status.approved { color: #58A6FF; background: #1A2B4A; }

  .qa-queue {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(0,0,0,0.12);
  }
  .qa-queue h3 {
    font-size: 10px;
    letter-spacing: 1px;
    color: #495057;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .qa-item {
    font-size: 10px;
    padding: 4px 8px;
    margin-bottom: 4px;
    border-radius: 3px;
    border-left: 3px solid #E74C3C;
    background: #1C1017;
    color: #C9D1D9;
  }
  .qa-item.pending { border-color: #E67E22; }

  .log-section {
    padding: 10px 14px;
    overflow-y: auto;
    max-height: 180px;
  }
  .log-section h3 {
    font-size: 10px;
    letter-spacing: 1px;
    color: #495057;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .log-entry {
    font-size: 10px;
    color: #495057;
    padding: 2px 0;
    border-bottom: 1px solid rgba(0,0,0,0.04);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .log-entry span { color: #C9D1D9; }

  /* Language toggle */
  .lang-toggle {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 3px;
    overflow: hidden;
    font-size: 10px;
    font-family: 'Courier New', monospace;
    letter-spacing: 1px;
    user-select: none;
  }
  .lang-btn {
    padding: 3px 8px;
    cursor: pointer;
    background: transparent;
    border: none;
    color: #495057;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    transition: background 0.15s, color 0.15s;
  }
  .lang-btn:hover { background: rgba(0,0,0,0.04); }
  .lang-btn.active { background: #BEB1A4; color: #FFFFFF; font-weight: bold; }

  /* Enhanced terminal */
  .term-filters { display:flex; gap:4px; padding:4px 10px; background:#FFFFFF; border-bottom:1px solid rgba(0,0,0,0.06); }
  .term-filter { font-size:9px; padding:2px 8px; border-radius:3px; border:1px solid rgba(0,0,0,0.08); background:transparent; color:#495057; cursor:pointer; font-family:'Courier New',monospace; }
  .term-filter:hover { background:rgba(0,0,0,0.04); }
  .term-filter.active { background:#BEB1A4; color:#FFFFFF; border-color:#BEB1A4; }
  .term-entry { display:flex; gap:8px; align-items:flex-start; padding:3px 0; border-bottom:1px solid rgba(0,0,0,0.04); font-size:11px; }
  .term-ts { color:#868E96; flex-shrink:0; font-size:10px; min-width:60px; }
  .term-badge { font-size:9px; padding:1px 6px; border-radius:3px; font-weight:bold; flex-shrink:0; min-width:70px; text-align:center; }
  .term-msg { flex:1; color:#212529; word-break:break-word; }
  .term-agent-status .term-badge { background:#E3FAFC; color:#1098AD; }
  .term-qa .term-badge { background:#EBFBEE; color:#2B8A3E; }
  .term-qa.term-fail .term-badge { background:#FFF5F5; color:#E03131; }
  .term-milestone .term-badge { background:#FFF9DB; color:#E67700; }
  .term-cost .term-badge { background:#F8F9FA; color:#495057; }
  .term-reflection .term-badge { background:#F3F0FF; color:#7048E8; }
  .term-escalation .term-badge { background:#FFF5F5; color:#E03131; animation:pulse 1.5s infinite; }
  .term-system .term-badge { background:#F8F9FA; color:#868E96; }

  /* Projektplan tab */
  .projektplan { padding:20px; display:flex; gap:20px; flex:1; overflow:auto; background:#F8F9FA; }
  .pp-sidebar { width:160px; flex-shrink:0; }
  .pp-discipline { padding:10px 12px; border-radius:6px; margin-bottom:8px; border:1px solid rgba(0,0,0,0.08); background:#FFFFFF; cursor:default; display:flex; align-items:center; gap:8px; font-size:12px; }
  .pp-discipline-icon { width:24px; height:24px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:13px; }
  .pp-discipline-name { font-weight:600; color:#212529; }
  .pp-discipline-status { font-size:9px; margin-left:auto; padding:2px 6px; border-radius:8px; }
  .pp-status-done { background:#EBFBEE; color:#2B8A3E; }
  .pp-status-active { background:#FFF9DB; color:#E67700; }
  .pp-status-pending { background:#F8F9FA; color:#868E96; }
  .pp-status-problem { background:#FFF5F5; color:#E03131; }
  .pp-main { flex:1; }
  .pp-phase-header { display:flex; gap:0; margin-bottom:16px; border-bottom:2px solid rgba(0,0,0,0.08); }
  .pp-phase-label { flex:1; text-align:center; padding:8px 4px; font-size:11px; font-weight:700; letter-spacing:0.5px; color:#868E96; position:relative; }
  .pp-phase-label.active { color:#BEB1A4; }
  .pp-phase-label.active::after { content:''; position:absolute; bottom:-2px; left:10%; right:10%; height:2px; background:#BEB1A4; }
  .pp-row { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid rgba(0,0,0,0.04); }
  .pp-row-label { width:120px; font-size:11px; font-weight:600; color:#495057; flex-shrink:0; }
  .pp-bar-track { flex:1; height:20px; background:#F1F3F5; border-radius:4px; overflow:hidden; display:flex; }
  .pp-bar-segment { height:100%; transition:width 0.5s ease; }
  .pp-bar-done { background:#BEB1A4; }
  .pp-bar-active { background:#BEB1A466; animation:pulse 2s infinite; }
  .pp-row-pct { width:40px; text-align:right; font-size:11px; font-weight:700; color:#495057; flex-shrink:0; }
</style>
</head>
<body>

<header>
  <div>
    <h1>⬛ ARCHITECTAI DASHBOARD</h1>
    <div class="subtitle" data-i18n="header.subtitle">Multi-Agent Byggnadsdesignsystem</div>
  </div>
  <div style="display:flex;align-items:center;gap:14px;">
    <select id="projectSelector" style="background:rgba(0,0,0,0.04); color:#495057; border:1px solid rgba(0,0,0,0.12); border-radius:3px; padding:3px; font-size:10px; font-family:'Courier New', monospace; outline:none;">
      <option value="">-- select project --</option>
    </select>
    <div id="costTracker" title="Total API Cost" style="font-size:12px; font-weight:bold; color:var(--gold); display:flex; align-items:center; gap:6px; background:rgba(255,215,0,0.1); padding:4px 8px; border-radius:4px; border:1px solid rgba(255,215,0,0.2);">
      <span>💰</span> $<span id="costAmount">0.000</span>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('sv')">SV</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
    <div id="wsStatus" class="ws-status ws-disconnected" title="WebSocket connection status"><span class="ws-dot ws-sim"></span>SIM</div>
    <div class="milestone-bar" id="milestoneBar"></div>
  </div>
</header>

<div class="tab-bar">
  <button class="tab active" onclick="switchTab('live')" data-i18n="tab.live">LIVE-VY</button>
  <button class="tab" onclick="switchTab('agents')" data-i18n="tab.agents">AGENTER</button>
  <button class="tab" onclick="switchTab('outputs')" data-i18n="tab.outputs">UTDATA</button>
  <button class="tab" onclick="switchTab('projektplan')" data-i18n="tab.projektplan">PROJEKTPLAN</button>
</div>

<div id="tab-live" class="tab-content active" style="flex-direction:column;">
<div class="main" style="flex:1;display:flex;overflow:hidden;min-height:0;">
  <canvas id="worldCanvas"></canvas>
  <div class="sidebar">
    <div class="sidebar-section">
      <h3 data-i18n="sidebar.agentStatus">Agentstatus</h3>
      <div id="agentList"></div>
    </div>
    <div class="qa-queue">
      <h3 data-i18n="sidebar.qaQueue">QA-ko</h3>
      <div id="qaQueue"></div>
    </div>
    <div class="log-section">
      <h3 data-i18n="sidebar.activityLog">Aktivitetslogg</h3>
      <div id="activityLog"></div>
    </div>
  </div>
</div>
<div class="terminal-panel" id="terminalPanel" style="height:200px; min-height:100px; max-height:80vh; background:#F8F9FA; color:#212529; font-family:monospace; font-size:11px; border-top:2px solid rgba(0,0,0,0.12); display:flex; flex-direction:column; position:relative;">
  <div id="terminalResizer" style="height:8px; width:100%; position:absolute; top:-4px; cursor:ns-resize; z-index:10;"></div>
  <div style="padding:4px 10px; background:#FFFFFF; border-bottom:1px solid rgba(0,0,0,0.12); display:flex; justify-content:space-between; align-items:center;">
    <span style="color:#40C057; font-weight:bold;" data-i18n="terminal.title">&gt;_ SYSTEMTERMINAL (LIVE)</span>
    <button id="btnApprove" disabled style="background:#2EA043; color:white; border:none; border-radius:4px; padding:4px 12px; font-weight:bold; font-size:11px; cursor:not-allowed;" onclick="approveMilestone()" data-i18n="terminal.approve">GODKANN MILSTOLPE</button>
  </div>
  <div class="term-filters">
    <button class="term-filter active" onclick="filterTerm('all')" data-i18n="term.all">Alla</button>
    <button class="term-filter" onclick="filterTerm('agent')" data-i18n="term.agents">Agenter</button>
    <button class="term-filter" onclick="filterTerm('qa')" data-i18n="term.qa">QA</button>
    <button class="term-filter" onclick="filterTerm('milestone')" data-i18n="term.milestones">Milstolpar</button>
  </div>
  <div id="terminalContent" style="flex:1; padding:10px; overflow-y:auto; line-height:1.4;"></div>
</div>
</div><!-- end tab-live -->

<div id="tab-agents" class="tab-content" style="overflow-y:auto; background:var(--bg);">
  <div class="agents-grid" id="agentsGrid"></div>
</div>

<div id="tab-outputs" class="tab-content" style="overflow-y:auto; flex-direction:column; background:var(--bg);">
  <div id="outputsRoot" style="padding:16px 20px;"></div>
</div>

<div id="tab-projektplan" class="tab-content" style="overflow-y:auto; flex-direction:column; background:#F8F9FA;">
  <div class="projektplan" id="projektplanRoot"></div>
</div>

<script>
// ============================================================
// i18n — Swedish / English
// ============================================================
const LANG = {

let termAutoScroll = true;
let termFilterMode = 'all';
const termEntries = [];
const MAX_TERM_ENTRIES = 500;

function addTermEntry(type, agent, message, details) {
  const now = new Date();
  const ts = now.toLocaleTimeString('sv', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  const entry = { type: type, agent: agent, message: message, details: details || '', ts: ts, time: now.getTime() };
  termEntries.push(entry);
  if (termEntries.length > MAX_TERM_ENTRIES) termEntries.shift();
  renderTermEntry(entry);
}

function renderTermEntry(entry) {
  var tc = document.getElementById('terminalContent');
  if (!tc) return;
  // Check filter
  if (termFilterMode !== 'all') {
    if (termFilterMode === 'agent' && entry.type !== 'agent-status') return;
    if (termFilterMode === 'qa' && entry.type !== 'qa' && entry.type !== 'qa-fail') return;
    if (termFilterMode === 'milestone' && entry.type !== 'milestone') return;
  }
  var div = document.createElement('div');
  var cssType = 'term-system';
  if (entry.type === 'agent-status') cssType = 'term-agent-status';
  else if (entry.type === 'qa') cssType = 'term-qa';
  else if (entry.type === 'qa-fail') cssType = 'term-qa term-fail';
  else if (entry.type === 'milestone') cssType = 'term-milestone';
  else if (entry.type === 'cost') cssType = 'term-cost';
  else if (entry.type === 'reflection') cssType = 'term-reflection';
  else if (entry.type === 'escalation') cssType = 'term-escalation';
  div.className = 'term-entry ' + cssType;
  div.setAttribute('data-type', entry.type);
  div.innerHTML = '<span class="term-ts">' + entry.ts + '</span>'
    + '<span class="term-badge">' + (entry.agent || 'SYSTEM') + '</span>'
    + '<span class="term-msg">' + escapeHtml(entry.message) + (entry.details ? ' <span style="color:#868E96">' + escapeHtml(entry.details) + '</span>' : '') + '</span>';
  tc.appendChild(div);
  // Auto-scroll
  if (termAutoScroll) tc.scrollTop = tc.scrollHeight;
  // Limit DOM entries
  while (tc.children.length > MAX_TERM_ENTRIES) tc.removeChild(tc.firstChild);
}

function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function filterTerm(mode) {
  termFilterMode = mode;
  document.querySelectorAll('.term-filter').forEach(function(b) { b.classList.toggle('active', b.getAttribute('onclick').indexOf("'" + mode + "'") > -1); });
  var tc = document.getElementById('terminalContent');
  if (tc) tc.innerHTML = '';
  termEntries.forEach(function(e) { renderTermEntry(e); });
}

// Detect manual scroll
(function() {
  var tc = document.getElementById('terminalContent');
  if (tc) {
    tc.addEventListener('scroll', function() {
      var atBottom = tc.scrollHeight - tc.scrollTop - tc.clientHeight < 30;
      termAutoScroll = atBottom;
    });
  }
})();

// Parse console line into structured entry
function parseConsoleLine(line) {
  if (!line || line.trim().length === 0) return null;
  var lower = line.toLowerCase();
  // Detect type from content
  if (lower.indexOf('[info]') > -1 || lower.indexOf('[success]') > -1) {
    var agentMatch = line.match(/\[(\w+)\]/g);
    var agent = agentMatch && agentMatch.length > 1 ? agentMatch[1].replace(/[\[\]]/g, '') : 'system';
    var msg = line.replace(/\[[\w]+\]\s*/g, '').trim();
    if (lower.indexOf('qa') > -1 && (lower.indexOf('pass') > -1 || lower.indexOf('approved') > -1)) return { type:'qa', agent:'QA', message:msg };
    if (lower.indexOf('qa') > -1 && (lower.indexOf('fail') > -1 || lower.indexOf('rejected') > -1)) return { type:'qa-fail', agent:'QA', message:msg };
    if (lower.indexOf('milestone') > -1 || lower.indexOf('m1') > -1 || lower.indexOf('m2') > -1 || lower.indexOf('m3') > -1 || lower.indexOf('m4') > -1 || lower.indexOf('m5') > -1) return { type:'milestone', agent:agent, message:msg };
    if (lower.indexOf('cost') > -1 || lower.indexOf('$') > -1) return { type:'cost', agent:agent, message:msg };
    if (lower.indexOf('reflection') > -1) return { type:'reflection', agent:agent, message:msg };
    if (lower.indexOf('alternative') > -1 || lower.indexOf('escalat') > -1) return { type:'escalation', agent:agent, message:msg };
    return { type:'agent-status', agent:agent, message:msg };
  }
  if (lower.indexOf('[error]') > -1 || lower.indexOf('[warning]') > -1) {
    return { type:'escalation', agent:'system', message:line.replace(/\[[\w]+\]\s*/g, '').trim() };
  }
  return { type:'system', agent:'system', message:line.trim() };
}

function renderProjektplan() {
  var root = document.getElementById('projektplanRoot');
  if (!root) return;

  var phases = [
    { key:'forstudie', milestones:['M1'] },
    { key:'program', milestones:['M2'] },
    { key:'system', milestones:['M3'] },
    { key:'bygg', milestones:['M4'] },
    { key:'produktion', milestones:['M5'] },
  ];

  var disciplines = [
    { key:'arkitektur', icon:'A', color:'#3498DB', agents:['brief','architect'], milestones:['M1','M2'] },
    { key:'konstruktion', icon:'K', color:'#95A5A6', agents:['structural'], milestones:['M2','M3'] },
    { key:'vvs', icon:'V', color:'#E67E22', agents:['mep'], milestones:['M3'] },
    { key:'el', icon:'E', color:'#F1C40F', agents:[], milestones:[] },
    { key:'brand', icon:'B', color:'#E74C3C', agents:['qa','compliance'], milestones:['M1','M2','M3','M4'] },
  ];

  // Compute progress for each discipline
  var msStatus = _lastMilestones || {};
  function milestoneProgress(mKey) {
    var ms = msStatus[mKey];
    if (!ms) return 0;
    if (ms.status === 'approved' || ms.approved_at) return 1;
    return 0;
  }

  function disciplineProgress(disc) {
    if (disc.milestones.length === 0) return 0;
    var total = 0;
    disc.milestones.forEach(function(m) { total += milestoneProgress(m); });
    // Also check if agents are working (partial progress)
    disc.agents.forEach(function(aid) {
      var dashId = aid;
      if (agentState[dashId] && agentState[dashId].status === 'working') total += 0.3;
    });
    return Math.min(1, total / disc.milestones.length);
  }

  function statusBadge(progress) {
    if (progress >= 1) return '<span class="pp-discipline-status pp-status-done">' + t('status.done') + '</span>';
    if (progress > 0) return '<span class="pp-discipline-status pp-status-active">' + t('status.active') + '</span>';
    return '<span class="pp-discipline-status pp-status-pending">' + t('status.pending') + '</span>';
  }

  // Current active phase
  var activePhaseIdx = Math.min(currentMilestone, 4);

  // Build HTML
  var html = '<div class="pp-sidebar">';
  html += '<div style="font-size:10px;letter-spacing:1px;color:#868E96;text-transform:uppercase;margin-bottom:10px;font-weight:bold;">' + t('pp.disciplines') + '</div>';
  disciplines.forEach(function(d) {
    var p = disciplineProgress(d);
    html += '<div class="pp-discipline">'
      + '<div class="pp-discipline-icon" style="background:' + d.color + '">' + d.icon + '</div>'
      + '<div class="pp-discipline-name">' + t('pp.' + d.key) + '</div>'
      + statusBadge(p)
      + '</div>';
  });
  html += '</div>';

  html += '<div class="pp-main">';
  // Phase headers
  html += '<div class="pp-phase-header">';
  phases.forEach(function(ph, i) {
    var cls = i === activePhaseIdx ? 'pp-phase-label pp-active' : (i < activePhaseIdx ? 'pp-phase-label pp-done' : 'pp-phase-label');
    html += '<div class="' + cls + '">' + t('phase.' + ph.key) + '</div>';
  });
  html += '</div>';

  // Discipline rows with progress bars
  disciplines.forEach(function(d) {
    var p = disciplineProgress(d);
    var pct = Math.round(p * 100);
    var doneWidth = Math.round(Math.min(p, 1) * 100);
    var activeWidth = (p > 0 && p < 1) ? 8 : 0;

    html += '<div class="pp-row">'
      + '<div class="pp-row-label">' + t('pp.' + d.key) + '</div>'
      + '<div class="pp-bar-track" style="position:relative">';
    // Phase dividers
    for (var i = 1; i < 5; i++) {
      html += '<div style="position:absolute;top:0;bottom:0;left:' + (i*20) + '%;width:1px;background:rgba(0,0,0,0.08);z-index:1"></div>';
    }
    html += '<div class="pp-bar-segment pp-bar-done" style="width:' + doneWidth + '%"></div>'
      + '<div class="pp-bar-segment pp-bar-active" style="width:' + activeWidth + '%"></div>'
      + '</div>'
      + '<div class="pp-row-pct">' + pct + '%</div>'
      + '</div>';
  });
  html += '</div>';

  root.innerHTML = html;
}

function resetSim() {
  simTime = 0;
  simEvents.length = 0;
  qaQueue.length = 0;
  currentMilestone = 0;
  milestoneWaiting = false;
  AGENTS.forEach(a => {
    const s = agentState[a.id];
    s.station = null;
    s.targetStation = null;
    s.moving = false;
    s.status = 'waiting';
    s.rejected = false;
  });
  updateMilestoneUI();
  initSim();
}

function moveAgent(agentId, stationId, status) {
  const s = agentState[agentId];
  const station = STATIONS.find(st => st.id === stationId);
  if (!station) return;
  s.targetStation = stationId;
  s.status = status;
  s.moving = true;
  s.rejected = (status === 'blocked');
}

function sendToQA(type, label) {
  qaQueue.push({ type, label, status: 'pending' });
  moveAgent('qa', 'qa', 'working');
  addLog('QA', `Reviewing: ${label}`);
  updateQAUI();
}

function qaApprove(type, label) {
  const idx = qaQueue.findIndex(q => q.type === type);
  if (idx >= 0) qaQueue.splice(idx, 1);
  addLog('QA', `✅ APPROVED: ${label}`);
  updateQAUI();
}

function qaReject(type, label) {
  const idx = qaQueue.findIndex(q => q.type === type);
  if (idx >= 0) qaQueue.splice(idx, 1);
  addLog('QA', `❌ REJECTED: ${label}`);
  updateQAUI();
}

function addLog(agent, msg) {
  const time = new Date().toLocaleTimeString('en', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  logs.unshift(`${time} [${agent}] ${msg}`);
  if (logs.length > 20) logs.pop();
  updateLogUI();
}

// ============================================================
// DRAWING
// ============================================================
function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  W = canvas.width = rect.width;
  H = canvas.height = rect.height;
}

function getStationRect(st) {
  return {
    x: st.x * W,
    y: st.y * H,
    w: st.w * W,
    h: st.h * H,
  };
}

function getStationCenter(stId) {
  const st = STATIONS.find(s => s.id === stId);
  if (!st) return { x: W/2, y: H/2 };
  const r = getStationRect(st);
  return { x: r.x + r.w/2, y: r.y + r.h/2 };
}

function getAgentSlotInStation(agentId, stId) {
  const agentsAtStation = AGENTS.filter(a => {
    const s = agentState[a.id];
    return (s.station === stId || s.targetStation === stId);
  });
  const idx = agentsAtStation.findIndex(a => a.id === agentId);
  const c = getStationCenter(stId);
  const slot = (idx - (agentsAtStation.length - 1) / 2) * 22;
  return { x: c.x + slot, y: c.y };
}

function drawStation(st) {
  const { x, y, w, h } = getStationRect(st);
  ctx.save();

  // Meeting Room special style
  if (st.isMeeting) {
    // Golden glow border
    ctx.shadowColor = '#BEB1A4';
    ctx.shadowBlur = 14;
    ctx.strokeStyle = '#BEB1A488';
    ctx.lineWidth = 2;
    ctx.fillStyle = '#1A1700';
    roundRect(ctx, x, y, w, h, 6);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Label
    ctx.fillStyle = '#BEB1A4';
    ctx.font = `bold ${Math.max(9, W * 0.009)}px Courier New`;
    ctx.textAlign = 'center';
    ctx.fillText(st.label, x + w/2, y + 14);

    // Round table in center
    const cx = x + w/2, cy = y + h/2 + 8;
    const tr = Math.min(w, h) * 0.22;
    ctx.strokeStyle = '#B8860B';
    ctx.lineWidth = 2;
    ctx.fillStyle = '#2A1F00';
    ctx.beginPath();
    ctx.arc(cx, cy, tr, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Chairs around table
    const chairs = 6;
    for (let i = 0; i < chairs; i++) {
      const angle = (i / chairs) * Math.PI * 2;
      const cx2 = cx + Math.cos(angle) * (tr + 6);
      const cy2 = cy + Math.sin(angle) * (tr + 6);
      ctx.fillStyle = '#3D2B00';
      ctx.beginPath();
      ctx.arc(cx2, cy2, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // "PM always here" hint
    ctx.fillStyle = '#BEB1A455';
    ctx.font = `${Math.max(7, W * 0.007)}px Courier New`;
    ctx.fillText('PM permanent', x + w/2, y + h - 8);

    ctx.restore();
    return;
  }

  // glow for milestone when waiting
  if (st.id === 'milestone' && milestoneWaiting) {
    ctx.shadowColor = '#BEB1A4';
    ctx.shadowBlur = 18;
  }
  if (st.id === 'qa') {
    ctx.shadowColor = '#C0392B';
    ctx.shadowBlur = 8;
  }

  ctx.strokeStyle = st.id === 'milestone' && milestoneWaiting ? '#BEB1A4' :
                    st.id === 'qa' ? '#C0392B44' : 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 1;
  ctx.fillStyle = '#FFFFFF';
  roundRect(ctx, x, y, w, h, 4);
  ctx.fill();
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#495057';
  ctx.font = `bold ${Math.max(9, W * 0.009)}px Courier New`;
  ctx.textAlign = 'center';
  ctx.fillText(st.label, x + w/2, y + 14);

  // QA queue count
  if (st.id === 'qa' && qaQueue.length > 0) {
    ctx.fillStyle = '#E74C3C';
    ctx.font = `bold ${Math.max(10, W * 0.01)}px Courier New`;
    ctx.fillText(`[${qaQueue.length} pending]`, x + w/2, y + 28);
  }

  // Milestone waiting text
  if (st.id === 'milestone' && milestoneWaiting) {
    ctx.fillStyle = '#BEB1A4';
    ctx.font = `${Math.max(8, W * 0.008)}px Courier New`;
    ctx.fillText('⏳ AWAITING', x + w/2, y + h - 8);
  }

  ctx.restore();
}

// Pixel humanoid (16×24 grid, scale factor)
// targetCtx is optional — defaults to the global canvas ctx
function drawPixelAgent(x, y, color, hat, scale, status, bobPhase, rejected, targetCtx) {
  const _ctx = targetCtx || ctx;
  const s = scale;
  const bop = rejected ? Math.sin(bobPhase * 3) * 2 : Math.sin(bobPhase) * (status === 'working' ? 2 : 0.5);
  const ry = Math.round(y + bop);

  // shadow
  _ctx.save();
  _ctx.fillStyle = 'rgba(0,0,0,0.3)';
  _ctx.beginPath();
  _ctx.ellipse(x, ry + s*12, s*6, s*2, 0, 0, Math.PI*2);
  _ctx.fill();

  // legs
  _ctx.fillStyle = '#2C3E50';
  if (status === 'working') {
    // walking animation
    const walk = Math.sin(bobPhase * 4) * s * 2;
    _ctx.fillRect(x - s*3, ry + s*7, s*2, s*5 + walk);
    _ctx.fillRect(x + s*1, ry + s*7, s*2, s*5 - walk);
  } else {
    _ctx.fillRect(x - s*3, ry + s*7, s*2, s*5);
    _ctx.fillRect(x + s*1, ry + s*7, s*2, s*5);
  }

  // body
  _ctx.fillStyle = color + 'CC';
  _ctx.fillRect(x - s*4, ry + s*1, s*8, s*7);

  // arms
  _ctx.fillStyle = color + '99';
  if (status === 'working') {
    const arm = Math.sin(bobPhase * 4 + 1) * s * 2;
    _ctx.fillRect(x - s*6, ry + s*2 + arm, s*2, s*4);
    _ctx.fillRect(x + s*4, ry + s*2 - arm, s*2, s*4);
  } else if (status === 'done' || status === 'approved') {
    // Arms raised in celebration
    _ctx.fillRect(x - s*6, ry - s*1, s*2, s*4);
    _ctx.fillRect(x + s*4, ry - s*1, s*2, s*4);
  } else {
    _ctx.fillRect(x - s*6, ry + s*2, s*2, s*4);
    _ctx.fillRect(x + s*4, ry + s*2, s*2, s*4);
  }

  // head
  _ctx.fillStyle = '#F5CBA7';
  _ctx.fillRect(x - s*3, ry - s*4, s*6, s*5);

  // eyes
  _ctx.fillStyle = '#1A1A1A';
  _ctx.fillRect(x - s*2, ry - s*3, s*1, s*1);
  _ctx.fillRect(x + s*1, ry - s*3, s*1, s*1);

  // hat / helmet
  _ctx.fillStyle = hat;
  _ctx.fillRect(x - s*4, ry - s*5, s*8, s*2);
  _ctx.fillRect(x - s*3, ry - s*7, s*6, s*3);

  // Document held in hands during handoff
  if (status === 'handoff') {
    _ctx.fillStyle = '#FFFFFF';
    _ctx.fillRect(x + s*2, ry + s*2, s*5, s*6);
    _ctx.strokeStyle = '#2C3E50';
    _ctx.lineWidth = 0.5;
    _ctx.strokeRect(x + s*2, ry + s*2, s*5, s*6);
    // Lines on document
    _ctx.fillStyle = '#ADB5BD';
    _ctx.fillRect(x + s*3, ry + s*3, s*3, s*1);
    _ctx.fillRect(x + s*3, ry + s*5, s*3, s*1);
  }

  // status icon above head
  _ctx.font = `${Math.max(9, s * 8)}px serif`;
  _ctx.textAlign = 'center';
  if (status === 'blocked' || rejected) {
    _ctx.fillText('💢', x, ry - s*9);
  } else if (status === 'waiting') {
    // Animated Zzz sleep bubbles
    const zCount = 3;
    for (let i = 0; i < zCount; i++) {
      // Each Z floats up and fades at a different offset
      const offset = (bobPhase * 0.4 + i * (Math.PI * 2 / zCount)) % (Math.PI * 2);
      const progress = offset / (Math.PI * 2); // 0..1
      const zx = x + s * 3 + progress * s * 5;
      const zy = ry - s * 9 - progress * s * 8;
      const alpha = Math.sin(progress * Math.PI); // fade in then out
      const zSize = Math.max(7, s * 5 + progress * s * 3);
      _ctx.save();
      _ctx.globalAlpha = alpha * 0.85;
      _ctx.font = `bold ${zSize}px Courier New`;
      _ctx.fillStyle = '#79C0FF';
      _ctx.fillText('z', zx, zy);
      _ctx.restore();
    }
  } else if (status === 'handoff') {
    _ctx.fillText('📤', x, ry - s*9);
  } else if (status === 'done') {
    // Jubel — arms raised
    _ctx.fillText('🎉', x, ry - s*9);
  } else if (status === 'qa') {
    _ctx.fillText('📋', x, ry - s*9);
  } else if (status === 'approved') {
    _ctx.fillText('✅', x, ry - s*9);
  }

  _ctx.restore();
}

function drawAgentLabel(x, y, name, scale) {
  ctx.save();
  ctx.font = `${Math.max(8, scale * 7)}px Courier New`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#F8F9FACC';
  const tw = ctx.measureText(name).width;
  ctx.fillRect(x - tw/2 - 2, y + scale*14, tw + 4, scale*7 + 2);
  ctx.fillStyle = '#212529';
  ctx.fillText(name, x, y + scale*20);
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - h + r, y + h);  // bug fix workaround
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawConnectors() {
  const pairs = [
    ['meeting','input'], ['meeting','brief'], ['meeting','compliance'],
    ['meeting','design'], ['meeting','structure'], ['meeting','mep'],
    ['meeting','ifc'], ['meeting','milestone'],
    ['input','brief'], ['brief','compliance'], ['compliance','qa'],
    ['brief','design'], ['design','structure'], ['structure','mep'],
    ['mep','qa'], ['design','qa'], ['qa','milestone'],
    ['structure','qa'], ['ifc','qa'], ['mep','ifc'],
  ];
  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,0.12)55';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]);
  for (const [a, b] of pairs) {
    const ca = getStationCenter(a);
    const cb = getStationCenter(b);
    ctx.beginPath();
    ctx.moveTo(ca.x, ca.y);
    ctx.lineTo(cb.x, cb.y);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();
}

function triggerHandoff(fromId, toId) {
  const fromState = agentState[fromId];
  const toAgent = STATIONS.find(s => s.id === (toId === 'qa' ? 'qa' : 'meeting'));
  if (!fromState || !toAgent) return;
  handoffs.push({
    x: fromState.x, y: fromState.y,
    tx: toAgent.x, ty: toAgent.y,
    progress: 0, alpha: 1,
    color: (AGENTS.find(a => a.id === fromId) || {color:'#666'}).color,
  });
}

// ============================================================
// MAIN LOOP
// ============================================================
const SCALE = 2;
const SPEED = 0.04;

function update() {
  tick++;

  // Advance simulation only when not connected to live server
  if (!simPaused) {
    simTime++;
    while (simEvents.length > 0 && simEvents[0].t <= simTime) {
      simEvents.shift().fn();
    }
  }

  // Update agent positions
  AGENTS.forEach(a => {
    const s = agentState[a.id];
    s.bobPhase += 0.06;

    if (s.targetStation) {
      const slot = getAgentSlotInStation(a.id, s.targetStation);
      s.tx = slot.x;
      s.ty = slot.y;

      if (s.station === null) {
        // Snap to start position (waiting area at bottom)
        const idx = AGENTS.indexOf(a);
        s.x = W * 0.25 + (idx % 5) * 30;
        s.y = H * 0.88 - Math.floor(idx / 5) * 36;
        s.station = s.targetStation;
      }

      const dx = s.tx - s.x;
      const dy = s.ty - s.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 2) {
        s.x += dx * SPEED * (1 + dist * 0.005);
        s.y += dy * SPEED * (1 + dist * 0.005);
        s.moving = true;
      } else {
        s.x = s.tx;
        s.y = s.ty;
        s.moving = false;
        s.station = s.targetStation;
      }
    }
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Grid background
  ctx.save();
  ctx.strokeStyle = '#FFFFFF88';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.restore();

  drawConnectors();

  // Stations
  STATIONS.forEach(st => drawStation(st));

  // Agents — always draw
  AGENTS.forEach((a, idx) => {
    const s = agentState[a.id];
    if (!s.x || !s.y) {
      s.x = W * 0.10 + (idx % 5) * 30;
      s.y = H * 0.85 - Math.floor(idx / 5) * 30;
    }
    drawPixelAgent(s.x, s.y, a.color, a.hat, SCALE, s.status, s.bobPhase, s.rejected);
    drawAgentLabel(s.x, s.y, a.abbr, SCALE);
  });

  // Draw document handoff animations
  handoffs.forEach((h, i) => {
    h.progress = Math.min(1, h.progress + 0.015);
    h.x = h.x + (h.tx - h.x) * 0.015;
    h.y = h.y + (h.ty - h.y) * 0.015;
    if (h.progress > 0.85) h.alpha = Math.max(0, h.alpha - 0.05);

    ctx.save();
    ctx.globalAlpha = h.alpha;
    // Small document icon moving
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(h.x - 6, h.y - 8, 12, 16);
    ctx.strokeStyle = h.color;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(h.x - 6, h.y - 8, 12, 16);
    ctx.fillStyle = '#ADB5BD';
    ctx.fillRect(h.x - 4, h.y - 5, 8, 2);
    ctx.fillRect(h.x - 4, h.y - 1, 8, 2);
    ctx.fillRect(h.x - 4, h.y + 3, 8, 2);
    ctx.restore();
  });
  // Remove completed handoffs
  for (let i = handoffs.length - 1; i >= 0; i--) {
    if (handoffs[i].alpha <= 0) handoffs.splice(i, 1);
  }

  // Title watermark
  ctx.save();
  ctx.font = `bold ${Math.max(10, W * 0.012)}px Courier New`;
  ctx.fillStyle = '#BEB1A415';
  ctx.textAlign = 'right';
  ctx.fillText('AI Nightingale v0.1', W - 10, H - 10);
  ctx.restore();
}

function loop() {
  update();
  draw();
  updateAgentUI();
  requestAnimationFrame(loop);
}

function updateMilestoneUI() {
  const bar = document.getElementById('milestoneBar');
  const mKeys = ['milestone.M1','milestone.M2','milestone.M3','milestone.M4','milestone.M5'];
  bar.innerHTML = mKeys.map((k, i) => {
    const cls = i < currentMilestone ? 'done' : i === currentMilestone ? 'active' : '';
    return '<span class="milestone ' + cls + '">' + t(k) + '</span>';
  }).join(' - ');
}

function updateAgentUI() {
  if (tick % 10 !== 0) return;
  const list = document.getElementById('agentList');
  list.innerHTML = AGENTS.map(a => {
    const s = agentState[a.id];
    const rawStatus = s.moving ? 'moving' : s.status;
    const localStatus = t('status.' + rawStatus) || rawStatus;
    return `
      <div class="agent-row">
        <div class="agent-dot" style="background:${a.color}"></div>
        <div class="agent-name">${a.name}</div>
        <div class="agent-status ${rawStatus}">${localStatus}</div>
      </div>`;
  }).join('');
}

function updateQAUI() {
  const el = document.getElementById('qaQueue');
  if (qaQueue.length === 0) {
    el.innerHTML = '<div style="font-size:10px;color:#495057">' + t('qa.noItems') + '</div>';
    return;
  }
  el.innerHTML = qaQueue.map(q =>
    `<div class="qa-item pending">${q.label}</div>`
  ).join('');
}

function updateLogUI() {
  const el = document.getElementById('activityLog');
  el.innerHTML = logs.slice(0, 8).map(l =>
    `<div class="log-entry">${l}</div>`
  ).join('');
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
  if (name === 'live') resize();
  if (name === 'outputs') renderOutputs();
  if (name === 'projektplan') renderProjektplan();
}

// ============================================================

// Document registry
const OUTPUT_DOCS = {};

let originURL = window.location.origin;
if (originURL === 'null' || originURL.includes('file://')) {
  originURL = 'http://localhost:8765';
}

async function renderOutputs() {
  const root = document.getElementById('outputsRoot');
  const sel = document.getElementById('projectSelector');
  const project = sel ? sel.value : null;

  if (!project) {
    root.innerHTML = '<div style="padding:20px; color:#868E96; text-align:center;">No project selected.</div>';
    return;
  }

  try {
    const res = await fetch(`${originURL}/files/${project}`);
    if (!res.ok) throw new Error('Network response was not ok');
    const data = await res.json();
    
    // Check locked files based on working agents
    const workingOutputs = [];
    AGENT_CARDS.forEach(a => {
      const state = agentState[a.id];
      if (state && state.status === 'working') {
        workingOutputs.push(...a.outputs);
      }
    });

    if (!data.files || data.files.length === 0) {
      root.innerHTML = `
        <div class="outputs-header"><h2>📁 PROJECT FILES — ${project}</h2></div>
        <div style="padding:20px; background:#FFFFFF; border:1px dashed rgba(0,0,0,0.12); border-radius:6px; color:#868E96; text-align:center; margin-top:10px;">
          Pipeline is empty. No files produced yet.
        </div>
      `;
      return;
    }

    const filesHTML = data.files.map(f => {
      // Basic match to see if locked
      const isLocked = workingOutputs.some(o => f.name.includes(o) || o.includes(f.name.split('.')[0]));
      const sizeStr = (f.size / 1024).toFixed(1) + ' KB';
      const dateStr = new Date(f.updated).toLocaleTimeString('en', {hour:'2-digit', minute:'2-digit'});
      const ext = f.name.split('.').pop() || '';
      const icon = ext === 'json' ? '📄' : ext === 'ifc' ? '🏛' : ext === 'png' ? '🖼' : '📁';
      
      const badgeHTML = isLocked 
        ? `<span class="doc-badge active">⏳ LOCKED (Working)</span>` 
        : `<span class="doc-badge done">${sizeStr}</span>`;

      const wrapperStyle = isLocked ? `opacity:0.6; cursor:not-allowed; border-color:#FA525244; background:#FFF5F5;` : `cursor:pointer;`;
      const onclickAttr = isLocked ? `` : `onclick="window.open('${originURL}/download/${project}/${f.path}', '_blank')"`;

      return `
        <div class="doc-item" style="${wrapperStyle}" ${onclickAttr}>
          <span class="doc-icon">${icon}</span>
          <div class="doc-info">
            <div class="doc-name" style="font-weight:bold">${f.name}</div>
            <div class="doc-meta">${dateStr}</div>
          </div>
          ${badgeHTML}
        </div>
      `;
    }).join('');

    root.innerHTML = `
      <div class="outputs-header">
        <h2>📁 PROJECT FILES — ${project}</h2>
      </div>
      <div class="milestone-folder">
        <div class="milestone-folder-body">
          <div class="discipline-group">
            <div class="discipline-label">All Generated Artifacts</div>
            ${filesHTML}
          </div>
        </div>
      </div>
    `;
  } catch (err) {
    root.innerHTML = `<div style="padding:20px; color:#E74C3C;">Failed to load files: ${err.message}</div>`;
  }
}

let _cardAnimPhase = {};
function animateAgentCardSprites() {
  if (document.getElementById('tab-agents').classList.contains('active')) {
    document.querySelectorAll('.agent-card-sprite').forEach(img => {
      const agentId = img.dataset.agentid;
      if (!agentId) return;
      const state = agentState[agentId];
      if (!state) return;

      // Get agent config
      const agConfig = AGENTS.find(a => a.id === agentId);
      if (!agConfig) return;

      // Advance phase
      if (!_cardAnimPhase[agentId]) _cardAnimPhase[agentId] = 0;
      _cardAnimPhase[agentId] += 0.06;

      const offCanvas = document.createElement('canvas');
      offCanvas.width = 100;
      offCanvas.height = 120;
      const offCtx = offCanvas.getContext('2d');
      drawPixelAgent(50, 55, agConfig.color, agConfig.hat, 3.5, state.status, _cardAnimPhase[agentId], state.rejected, offCtx);
      img.src = offCanvas.toDataURL();
    });
  }
  requestAnimationFrame(animateAgentCardSprites);
}

// WEBSOCKET LIVE CONNECTION
// ============================================================
(function () {
  const params = new URLSearchParams(window.location.search);
  const PROJECT_ID = params.get('project') || 'test-01';
  const WS_URL = `ws://localhost:8765/ws/${PROJECT_ID}`;

  let ws = null;
  let _reconnectTimer = null;

  // Server agent ID → dashboard agent ID
  const AGENT_MAP = {
    input_parser:      'parser',
    ifc_builder:       'ifc',
    component_library: null,  // not visualised on canvas
  };

  // Server output key → dashboard doc ID
  const OUTPUT_MAP = {
    room_program:      'room_program',
    spatial_layout:    'spatial_layout',
    structural_schema: 'structural',
    mep_schema:        'mep',
    ifc_model:         'ifc_model',
  };

  function connect() {
    if (ws) { try { ws.close(); } catch (_) {} }
    try { ws = new WebSocket(WS_URL); } catch (_) { scheduleReconnect(); return; }

    ws.onopen = () => {
      simPaused = true;
      setStatus(true);
    };
    ws.onclose = () => {
      simPaused = false;
      setStatus(false);
      scheduleReconnect();
    };
    ws.onerror = () => { /* onclose fires next */ };
    ws.onmessage = (e) => {
      try { handle(JSON.parse(e.data)); } catch (_) {}
    };
  }

  function scheduleReconnect() {
    clearTimeout(_reconnectTimer);
    _reconnectTimer = setTimeout(connect, 5000);
  }

  function handle(msg) {
    if (msg.type === 'state_update') applyState(msg);
    else if (msg.type === 'log')    addLog(msg.agent || 'server', msg.message || msg.text || '');
  }

  function applyState(s) {
    // Milestone
    if (typeof s.milestone === 'number') {
      currentMilestone = s.milestone;
      updateMilestoneUI();
    }
    // Phase → milestone gate indicator
    if (s.phase) milestoneWaiting = s.phase.includes('awaiting');

    // Agent statuses
    if (s.agents) {
      const STATUS = { working:'working', done:'approved', waiting:'waiting', qa:'qa', blocked:'blocked' };
      const STATION_MAP = {
        'pm': 'meeting', 'parser': 'input', 'brief': 'brief',
        'compliance': 'compliance', 'architect': 'design',
        'structural': 'structure', 'mep': 'mep', 'ifc': 'ifc', 'qa': 'qa'
      };
      
      Object.entries(s.agents).forEach(([sid, status]) => {
        const did = AGENT_MAP.hasOwnProperty(sid) ? AGENT_MAP[sid] : sid;
        if (!did || !agentState[did]) return;
        const newStatus = STATUS[status] || 'waiting';
        const prevStatus = agentState[did].status;
        agentState[did].status = newStatus;

        // Trigger handoff animation when agent submits to QA
        if (prevStatus === 'working' && (newStatus === 'qa' || newStatus === 'approved')) {
          agentState[did].status = 'handoff';
          setTimeout(() => { agentState[did].status = newStatus; }, 2000);
          triggerHandoff(did, 'qa');
        }
        agentState[did]._prevStatus = newStatus;

        // Ensure agent is moved to their work station when they start working
        if (newStatus === 'working') {
           agentState[did].targetStation = STATION_MAP[did];
        } else if (newStatus === 'qa') {
           agentState[did].targetStation = 'qa';
        }
      });
    }

    // Outputs
    if (s.outputs) {
      Object.entries(s.outputs).forEach(([key, out]) => {
        const docId = OUTPUT_MAP[key];
        if (!docId || !out) return;
        const docStatus = out.status === 'approved' ? 'done' : out.status === 'draft' ? 'active' : 'pending';
        setDocStatus(docId, docStatus, out.version || null);
      });
      renderOutputs();
    }
    
    // Update cost
    if (s.hasOwnProperty('total_cost_usd')) {
      const el = document.getElementById('costAmount');
      if (el) el.textContent = parseFloat(s.total_cost_usd).toFixed(3);
    }

    // Update milestones data for projektplan
    if (s.milestones) _lastMilestones = s.milestones;

    // Update Terminal with structured entries from console_output
    if (s.hasOwnProperty('console_output')) {
      // Track which lines we've already processed
      if (!window._lastConsoleLen) window._lastConsoleLen = 0;
      var lines = s.console_output;
      if (lines.length > window._lastConsoleLen) {
        for (var li = window._lastConsoleLen; li < lines.length; li++) {
          var parsed = parseConsoleLine(lines[li]);
          if (parsed) addTermEntry(parsed.type, parsed.agent, parsed.message);
        }
        window._lastConsoleLen = lines.length;
      }

      // Check combined text for approval state
      var combinedText = lines.join('\n');
      var btn = document.getElementById('btnApprove');
      if (combinedText.indexOf('System paused for human review.') > -1) {
         btn.disabled = false;
         btn.style.cursor = 'pointer';
         btn.style.opacity = '1';
         btn.textContent = t('terminal.approveAction');
         btn.style.boxShadow = '0 0 10px rgba(46,160,67,0.8)';
      } else {
         btn.disabled = true;
         btn.style.cursor = 'not-allowed';
         btn.style.opacity = '0.5';
         btn.textContent = t('terminal.waiting');
         btn.style.boxShadow = 'none';
      }
    }

    // Add decisions as terminal entries
    if (s.decisions && s.decisions.length > 0) {
      if (!window._lastDecisionCount) window._lastDecisionCount = 0;
      if (s.decisions.length > window._lastDecisionCount) {
        for (var di = window._lastDecisionCount; di < s.decisions.length; di++) {
          var dec = s.decisions[di];
          addTermEntry('agent-status', dec.agent || 'PM', dec.decision, dec.context || '');
        }
        window._lastDecisionCount = s.decisions.length;
      }
    }

    // Add reflections as terminal entries
    if (s.reflections && s.reflections.length > 0) {
      if (!window._lastReflectionCount) window._lastReflectionCount = 0;
      if (s.reflections.length > window._lastReflectionCount) {
        for (var ri = window._lastReflectionCount; ri < s.reflections.length; ri++) {
          var ref = s.reflections[ri];
          addTermEntry('reflection', ref.agent || 'system', ref.content, ref.milestone || '');
        }
        window._lastReflectionCount = s.reflections.length;
      }
    }

    // Update projektplan if visible
    if (document.getElementById('tab-projektplan') && document.getElementById('tab-projektplan').classList.contains('active')) {
      renderProjektplan();
    }

    // Log the newest incoming message (avoid flooding)
    if (s.recent_messages && s.recent_messages.length > 0) {
      const m = s.recent_messages[0];
      const text = (m.payload && (m.payload.text || m.payload.message)) || '';
      if (text) addLog(m.from || 'server', text.slice(0, 80));
    }
  }

  function setStatus(connected) {
    const el = document.getElementById('wsStatus');
    if (!el) return;
    if (connected) {
      el.className = 'ws-status ws-connected';
      el.innerHTML = '<span class="ws-dot ws-live"></span>LIVE';
    } else {
      el.className = 'ws-status ws-disconnected';
      el.innerHTML = '<span class="ws-dot ws-sim"></span>SIM';
    }
  }

  async function loadProjects() {
    try {
      const res = await fetch('http://localhost:8765/projects');
      if (!res.ok) return;
      const data = await res.json();
      const sel = document.getElementById('projectSelector');
      if (data.projects && data.projects.length > 0) {
        sel.innerHTML = data.projects.map(p => `<option value="${p}">${p}</option>`).join('');
        if (data.projects.includes(PROJECT_ID)) {
          sel.value = PROJECT_ID;
        } else if (!params.get('project')) {
          // If no project specified, redirect to the first available project
          window.location.href = `?project=${data.projects[0]}`;
        }
        sel.addEventListener('change', (e) => {
          window.location.href = `?project=${e.target.value}`;
        });
      }
    } catch (err) {
      console.log("[dashboard] Could not load projects API");
    }
  }

  loadProjects();
  connect();
})();

async function approveMilestone() {
  const sel = document.getElementById('projectSelector');
  if (!sel || !sel.value) return;
  const project = sel.value;
  
  const btn = document.getElementById('btnApprove');
  btn.textContent = 'APPROVING...';
  btn.disabled = true;
  
  let origin = window.location.origin;
  if (origin === 'null' || origin.includes('file://')) {
    origin = 'http://127.0.0.1:8765';
  }
  
  try {
    const res = await fetch(`${origin}/approve/${project}`, { method: 'POST' });
    if (!res.ok) alert('Failed to approve milestone');
  } catch (e) {
    alert('Network error: ' + e);
  }
}

let isResizing = false;
let lastDownY = 0;
const terminalPanel = document.getElementById('terminalPanel');
const resizer = document.getElementById('terminalResizer');

resizer.addEventListener('mousedown', function(e) {
  isResizing = true;
  lastDownY = e.clientY;
  document.body.style.cursor = 'ns-resize';
  e.preventDefault();
});

document.addEventListener('mousemove', function(e) {
  if (!isResizing) return;
  const delta = lastDownY - e.clientY;
  lastDownY = e.clientY;
  const newHeight = terminalPanel.offsetHeight + delta;
  if (newHeight >= 100 && newHeight <= window.innerHeight * 0.8) {
    terminalPanel.style.height = newHeight + 'px';
    resize(); // Trigger canvas layout fix
  }
});

document.addEventListener('mouseup', function(e) {
  isResizing = false;
  document.body.style.cursor = '';
});

window.addEventListener('resize', () => { resize(); });
resize();
updateMilestoneUI();
updateQAUI();
renderAgentCards();
animateAgentCardSprites();
renderOutputs();
initSim();
loop();
